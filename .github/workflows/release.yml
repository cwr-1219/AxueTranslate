name: Build & Release

# Triggers:
#   - Push of a tag like v1.2.3 → builds artifacts AND publishes a GitHub Release
#     (the version stripped of the leading "v" is passed to build-deb.sh)
#   - Pull requests touching the Linux project → CI build only (no release)
#   - Manual run from the Actions UI → CI build only
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'SpeedTranslate.Linux/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write   # required by the release job to create / update releases

jobs:
  linux-deb:
    name: Build Linux .deb
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.value }}
      deb_name: ${{ steps.build.outputs.deb_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dpkg-deb / fakeroot
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="0.0.0-ci.$(date -u +%Y%m%d).${GITHUB_SHA::7}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Build .deb
        id: build
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          cd SpeedTranslate.Linux/Packaging
          ./build-deb.sh
          deb=$(ls -1 ../../ReleaseSetup/axue-translate_${VERSION}_amd64.deb)
          echo "deb_name=$(basename "$deb")" >> "$GITHUB_OUTPUT"
          echo "Built: $deb"

      - name: Inspect package metadata
        run: |
          deb="ReleaseSetup/axue-translate_${{ steps.version.outputs.value }}_amd64.deb"
          dpkg-deb --info  "$deb"
          dpkg-deb --contents "$deb" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ steps.version.outputs.value }}
          path: ReleaseSetup/*.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-deb]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Body is auto-generated from PR titles/commits since the previous tag.
          # Append a short installation snippet for the Linux .deb:
          append_body: true
          body: |

            ## Linux install

            ```sh
            sudo apt install ./axue-translate_${{ needs.linux-deb.outputs.version }}_amd64.deb
            ```

            The `.deb` is a self-contained .NET 8 build — the target machine does not
            need a system `dotnet` install. See `SpeedTranslate.Linux/Packaging/Packaging.md`
            for runtime dependencies and Wayland notes.
